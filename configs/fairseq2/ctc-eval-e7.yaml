# Evaluation config for E7 checkpoint (true-firefly-27, crashed at step 53900, lr=5e-5, resume-e3).
# Evaluates on the held-out TEST split of the full CoRal-v3 mixture
# (read_aloud + conversation combined).
#
# Used by: scripts/hpc/17_eval_e7.sh
#
# NOTE: model.path is intentionally null — E7 crashed before completing and the
# workspace hash is unknown. Set model.path before submitting:
#
#   1. SSH to HPC and find the E7 workspace:
#        ls /work3/s204696/outputs/omniasr_e3/
#      E7 resumed from E3's checkpoint, so fairseq2 wrote a new workspace directory
#      (ws_1.XXXXXXXX, distinct from E3's ws_1.88015460) under the same parent dir.
#   2. E7 crashed at step 53900; fairseq2 saves every 1000 steps, so the last
#      checkpoint before the crash is at step_53000.
#   3. Set model.path to:
#        /work3/s204696/outputs/omniasr_e3/ws_1.XXXXXXXX/checkpoints/step_53000
#
# (model.path hardcoded — fairseq2 does NOT auto-select from the eval workspace dir)

model:
  name: "omniASR_CTC_300M_v2"
  family: "wav2vec2_asr"
  path: null  # set to resolved checkpoint path before submitting — see NOTE above

dataset:
  name: "coral_v3_danish"
  valid_split: "test"                   # evaluate on held-out test split
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 2_560_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

gang:
  timeout: 86400

evaluator:
  amp: true
  amp_dtype: "torch.bfloat16"
