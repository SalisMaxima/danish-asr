# Evaluation config for E7 checkpoint (true-firefly-27, crashed at step 53900, lr=5e-5, resume-e3).
# Evaluates on the held-out TEST split of the full CoRal-v3 mixture
# (read_aloud + conversation combined).
#
# Used by: scripts/hpc/17_eval_e7.sh
#
# NOTE: E7 crashed before completing. The checkpoint directory below assumes the best
# checkpoint is at step_53000 within E7's workspace.
# To find the correct workspace hash on HPC, run:
#   ls /work3/s204696/outputs/omniasr_e3/
# E7 used a different config than E3 so it has a different workspace hash (ws_1.XXXXXXXX).
# Update model.path below with the correct path before submitting.
#
# (model.path hardcoded — fairseq2 does NOT auto-select from the eval workspace dir)

model:
  name: "omniASR_CTC_300M_v2"
  path: /work3/s204696/outputs/omniasr_e3/FILL_IN_WS_HASH/checkpoints/step_53000  # pragma: allowlist secret

dataset:
  name: "coral_v3_danish"
  train_split: "train"                  # required by recipe schema, ignored during eval
  valid_split: "test"                   # evaluate on held-out test split
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 2_560_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

gang:
  timeout: 86400

trainer:
  mixed_precision:
    dtype: "torch.bfloat16"
