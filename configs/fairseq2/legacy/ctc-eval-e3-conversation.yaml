# Evaluation config for E3 checkpoint — conversation subset only.
# Reports WER/CER for the conversation test split in isolation.
#
# Subset filtering uses fairseq2's built-in "<split>_<corpus>" valid_split format.
# No subset TSV required.
#
# Used by: scripts/hpc/12_eval_e3.sh (with --config override)
# Checkpoint: /work3/s204696/outputs/omniasr_e3/ws_1.88015460/checkpoints/step_30000/model
#   (hardcoded via model.path; not auto-selected at runtime)

model:
  name: "omniASR_CTC_300M_v2"
  family: "wav2vec2_asr"
  arch: "300m_v2"
  path: /work3/s204696/outputs/omniasr_e3/ws_1.88015460/checkpoints/step_30000/model

dataset:
  name: "coral_v3_danish"
  valid_split: "test_coral_v3_conversation"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 2_560_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

gang:
  timeout: 86400

evaluator:
  amp: true
  amp_dtype: "torch.bfloat16"
