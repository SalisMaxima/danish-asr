# E2 experiment: higher learning rate (3e-5 vs baseline 1e-5).
# Hypothesis: 1e-5 is too conservative; upstream Meta default is 5e-5.
# See docs/experiment-plan.md §E2.

model:
  name: "omniASR_CTC_300M_v2"

dataset:
  name: "coral_v3_danish"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 2_560_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

optimizer:
  config:
    lr: 3e-5                   # 3× baseline (1e-5); upstream Meta default is 5e-5

lr_scheduler:
  name: "tri_stage"
  config:
    stage_ratio: [0.1, 0.0, 0.9]  # 10% warmup (3k steps), 90% cosine decay
    start_lr_scale: 0.01           # start at 1% of peak lr (3e-7)
    final_lr_scale: 0.05           # decay to 5% of peak lr (1.5e-6)

gang:
  timeout: 86400     # 24h in seconds — fairseq2 uses seconds, NOT minutes; default is 900s (15 min) which aborts at sync points

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 4

regime:
  num_steps: 30_000
  validate_after_n_steps: 500    # CTC outputs all-blank early → zero-length hyps crash WER
  validate_every_n_steps: 1000
  checkpoint_every_n_steps: 1000
  keep_last_n_checkpoints: 2      # avoid disk bloat — 30k steps × ~4GB/ckpt = 120GB without pruning
  keep_best_n_checkpoints: 1      # also keep best WER checkpoint regardless of recency
  publish_metrics_every_n_steps: 100
