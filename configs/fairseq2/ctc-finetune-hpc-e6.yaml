# E6 experiment: fix shuffle windows (1→1000), lr=5e-5, 50k steps.
# Both E3 and E5 had example_shuffle_window=1 and batch_shuffle_window=1,
# meaning no data shuffling (window=1 means no buffer). This causes spiky
# training loss (homogeneous batches from same speaker) and inflated train/val
# gap (~21 loss units). This run fixes the misconfiguration to test whether
# shuffling alone closes the gap.
# See docs/experiment-plan.md §E6.

model:
  name: "omniASR_CTC_300M_v2"

dataset:
  name: "coral_v3_danish"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 2_560_000
    batch_shuffle_window: 1000     # fixed: was 1 (no shuffle) in E3/E5
    normalize_audio: true
    example_shuffle_window: 1000  # fixed: was 1 (no shuffle) in E3/E5

tokenizer:
  name: "omniASR_tokenizer_written_v2"

optimizer:
  config:
    lr: 5e-5                   # same as E3 (best LR so far)

lr_scheduler:
  name: "tri_stage"
  config:
    stage_ratio: [0.1, 0.0, 0.9]  # 10% warmup (5k steps), 90% cosine decay
    start_lr_scale: 0.01
    final_lr_scale: 0.05

gang:
  timeout: 86400     # 24h in seconds

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 4

regime:
  num_steps: 50_000
  validate_after_n_steps: 500
  validate_every_n_steps: 1000
  checkpoint_every_n_steps: 1000
  keep_last_n_checkpoints: 2
  keep_best_n_checkpoints: 1
  publish_metrics_every_n_steps: 100
