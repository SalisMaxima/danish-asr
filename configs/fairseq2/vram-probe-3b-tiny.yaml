# VRAM probe: omniASR_CTC_3B_v2 on A100-40GB — minimal batch
# Fallback if vram-probe-3b.yaml OOMs. Quartered max_num_elements.

model:
  name: "omniASR_CTC_3B_v2"

dataset:
  name: "coral_v3_danish"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 960_000
    batch_shuffle_window: 1000
    normalize_audio: true
    example_shuffle_window: 1000

tokenizer:
  name: "omniASR_tokenizer_written_v2"

optimizer:
  config:
    lr: 5e-5

gang:
  timeout: 86400

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 16

regime:
  num_steps: 50
  validate_after_n_steps: 25
  validate_every_n_steps: 25
  checkpoint_every_n_steps: 50
  keep_last_n_checkpoints: 1
  keep_best_n_checkpoints: 0
  publish_metrics_every_n_steps: 10
