# ARCHIVED: 5k-step config used for initial training run (effortless-wildflower-13).
# This remains the default / legacy config used by scripts/hpc/run_training.py when --config is omitted.
# For the extended 20k run with explicit LR scheduler, prefer ctc-finetune-hpc-20k.yaml (or pass --config explicitly).

model:
  name: "omniASR_CTC_300M_v2"

dataset:
  name: "coral_v3_danish"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 3_840_000  # reduced from 7.68M — higher values cause GPU memory fragmentation and crashes on A100-PCIE-40GB
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

optimizer:
  config:
    lr: 1e-05

gang:
  timeout: 1200      # 20 hours in minutes — prevents fairseq2 from checkpoint-stopping at the default 15-min gang timeout

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 4

regime:
  num_steps: 5_000
  validate_after_n_steps: 500  # CTC outputs all-blank early → zero-length hyps crash WER; matches official Meta default
  validate_every_n_steps: 500
  checkpoint_every_n_steps: 500
  publish_metrics_every_n_steps: 100
