# Evaluation config for E6 checkpoint (bumbling-dawn-28, 50k steps, lr=5e-5, train_shuffle1000).
# "train_shuffle1000" refers to the training run's shuffle window (batch/example_shuffle_window=1000);
# the eval config itself always uses shuffle_window=1 for determinism.
# Evaluates on the held-out TEST split of the full CoRal-v3 mixture
# (read_aloud + conversation combined).
#
# Used by: scripts/hpc/16_eval_e6.sh
# Checkpoint: /work3/s204696/outputs/omniasr_e6/ws_1.0bb2600b/checkpoints/step_50000
# (model.path hardcoded — fairseq2 does NOT auto-select from the eval workspace dir)

model:
  name: "omniASR_CTC_300M_v2"
  path: /work3/s204696/outputs/omniasr_e6/ws_1.0bb2600b/checkpoints/step_50000

dataset:
  name: "coral_v3_danish"
  train_split: "train"                  # required by recipe schema, ignored during eval
  valid_split: "test"                   # evaluate on held-out test split
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 2_560_000
    batch_shuffle_window: 1
    normalize_audio: true
    example_shuffle_window: 1

tokenizer:
  name: "omniASR_tokenizer_written_v2"

gang:
  timeout: 86400

trainer:
  mixed_precision:
    dtype: "torch.bfloat16"
