# E6-style 3B training: shuffle windows fixed to 1000, lr=5e-5, 30k steps.
# Uses the 3B_v2 model with the batch shape established by the successful VRAM probe:
# max_num_elements=960K and grad_accumulation=16 to preserve the effective batch size.

model:
  name: "omniASR_CTC_3B_v2"

dataset:
  name: "coral_v3_danish"
  train_split: "train"
  valid_split: "dev"
  storage_mode: "MIXTURE_PARQUET"
  task_mode: "ASR"
  mixture_parquet_storage_config:
    dataset_summary_path: "data/parquet/version=0/language_distribution_0.tsv"
    beta_corpus: 0.5
    beta_language: 0.5
    fragment_loading:
      cache: true
  asr_task_config:
    min_audio_len: 32_000
    max_audio_len: 960_000
    max_num_elements: 960_000
    batch_shuffle_window: 1000
    normalize_audio: true
    example_shuffle_window: 1000

tokenizer:
  name: "omniASR_tokenizer_written_v2"

optimizer:
  config:
    lr: 5e-5

lr_scheduler:
  name: "tri_stage"
  config:
    stage_ratio: [0.1, 0.0, 0.9]
    start_lr_scale: 0.01
    final_lr_scale: 0.05

gang:
  timeout: 259200

trainer:
  freeze_encoder_for_n_steps: 0
  mixed_precision:
    dtype: "torch.bfloat16"
  grad_accumulation:
    num_batches: 16

regime:
  num_steps: 30_000
  validate_after_n_steps: 500
  validate_every_n_steps: 1000
  checkpoint_every_n_steps: 1000
  save_model_only: "all_but_last"
  keep_last_n_checkpoints: 1
  keep_best_n_checkpoints: 1
  publish_metrics_every_n_steps: 100
