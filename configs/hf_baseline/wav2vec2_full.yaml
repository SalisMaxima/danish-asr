# Wav2Vec2-XLS-R-300M full training on CoRal-v3
# Target: match CoRal benchmarks (CER 5.9%/13.7% read_aloud/conversation)

model_name: "facebook/wav2vec2-xls-r-300m"
vocab_file: "configs/vocab/coral_wav2vec2_ctc.json"
vocab_size: 72

# Training
max_steps: 100000
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 8  # effective batch = 32
learning_rate: 3.0e-5
warmup_steps: 500
lr_scheduler_type: "linear"
weight_decay: 0.01

# Precision & memory
bf16: true
gradient_checkpointing: true
freeze_feature_extractor: true

# Evaluation & saving
logging_steps: 100
eval_steps: 2000
save_steps: 2000
save_total_limit: 3
metric_for_best_model: "cer"

# Data
max_duration: 30.0
sample_rate: 16000
subsets:
  - read_aloud
  - conversation
dataloader_num_workers: 4

# Reproducibility
seed: 42
