# Whisper-large-v3 full training on CoRal-v3
# Target: match CoRal benchmarks (CER 4.5%/11.6% read_aloud/conversation)

model_name: "openai/whisper-large-v3"
language: "da"
task: "transcribe"

# Training
max_steps: 30000
per_device_train_batch_size: 2
per_device_eval_batch_size: 4
gradient_accumulation_steps: 16  # effective batch = 32
learning_rate: 1.0e-5
warmup_steps: 500
lr_scheduler_type: "linear"
weight_decay: 0.01

# Precision & memory
bf16: true
gradient_checkpointing: true

# Seq2seq
predict_with_generate: true
generation_max_length: 225

# Evaluation & saving
logging_steps: 100
eval_steps: 2000
save_steps: 2000
save_total_limit: 3
metric_for_best_model: "cer"

# Data
max_duration: 30.0
sample_rate: 16000
subsets:
  - read_aloud
  - conversation
dataloader_num_workers: 4

# Reproducibility
seed: 42
