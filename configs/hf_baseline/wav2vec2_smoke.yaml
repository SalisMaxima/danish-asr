# Wav2Vec2 smoke test — validate pipeline in <10 min

model_name: "facebook/wav2vec2-xls-r-300m"
vocab_file: "configs/vocab/coral_wav2vec2_ctc.json"
vocab_size: 72

# Training
max_steps: 500
per_device_train_batch_size: 4
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2
learning_rate: 3.0e-5
warmup_steps: 50
lr_scheduler_type: "linear"
weight_decay: 0.01

# Precision & memory
bf16: true
gradient_checkpointing: false
freeze_feature_extractor: true

# Evaluation & saving
logging_steps: 50
eval_steps: 250
save_steps: 250
save_total_limit: 2
metric_for_best_model: "cer"

# Data — read_aloud only for speed
max_duration: 30.0
sample_rate: 16000
subsets:
  - read_aloud
dataloader_num_workers: 4

# Reproducibility
seed: 42
